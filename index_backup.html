<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>我们的故事</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:"Microsoft YaHei","PingFang SC",sans-serif;background:#fff5f7;color:#4a3040;overflow:hidden;height:100vh}
#app{width:100%;height:100vh;position:relative;overflow:hidden}

/* Pages */
.page{position:absolute;top:0;left:0;width:100%;height:100%;overflow-y:auto;overflow-x:hidden;
  opacity:0;transform:translateY(30px);pointer-events:none;transition:opacity .45s ease,transform .45s ease;
  padding-bottom:90px}
.page.active{opacity:1;transform:translateY(0);pointer-events:auto}

/* Hero */
.hero{display:flex;align-items:center;justify-content:center;text-align:center;height:100%;
  background:linear-gradient(135deg,#fff0f5 0%,#ffe4e9 30%,#fff5f7 60%,#ffe4ec 100%)}
.hero h1{font-size:56px;font-weight:bold;background:linear-gradient(135deg,#ff69b4,#ff1493,#ff69b4);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.hero p{font-size:20px;color:#b895a4;margin-top:16px;letter-spacing:4px}
.hero .sub{font-size:14px;color:#d4bcc7;margin-top:8px}
.hero .start-btn{margin-top:40px;padding:14px 48px;background:linear-gradient(135deg,#ff69b4,#ff1493);
  color:#fff;border:none;border-radius:30px;font-size:18px;cursor:pointer;font-family:inherit;
  box-shadow:0 8px 24px rgba(255,105,180,0.3);transition:all .3s;animation:pulse 2s infinite}
.hero .start-btn:hover{transform:translateY(-2px);box-shadow:0 12px 32px rgba(255,105,180,0.4)}
@keyframes pulse{0%,100%{box-shadow:0 8px 24px rgba(255,105,180,0.3)}50%{box-shadow:0 8px 40px rgba(255,105,180,0.5)}}

/* Content pages */
.page-content{max-width:800px;margin:0 auto;padding:60px 24px 40px;text-align:center}
.page-content h2{font-size:36px;margin-bottom:12px;background:linear-gradient(135deg,#ff69b4,#ff1493);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.page-content .sub{color:#b895a4;font-size:15px;margin-bottom:36px}

/* Countdown */
.c-grid{display:flex;justify-content:center;gap:20px;flex-wrap:wrap}
.c-item{background:#fff;border:1px solid rgba(255,105,180,0.12);border-radius:20px;padding:24px 18px;
  min-width:90px;box-shadow:0 4px 20px rgba(255,105,180,0.06)}
.c-item .n{font-size:38px;font-weight:bold;background:linear-gradient(135deg,#ff69b4,#ff1493);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.c-item .l{color:#b895a4;margin-top:6px;font-size:13px}

/* Photo gallery - Polaroid */
.g-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;max-width:750px;margin:0 auto;padding:0 8px}
.g-item{position:relative;cursor:pointer;background:#fff;padding:8px 8px 28px 8px;border-radius:3px;
  box-shadow:2px 4px 12px rgba(0,0,0,0.08),0 1px 3px rgba(0,0,0,0.05);
  --rot:0deg;--delay:0s;
  transform:rotate(var(--rot));
  opacity:0;animation:photoIn .6s ease var(--delay) forwards;
  transition:transform .4s cubic-bezier(.34,1.56,.64,1),box-shadow .4s ease,z-index 0s}
.g-item:nth-child(1){--delay:.05s}.g-item:nth-child(2){--delay:.1s}.g-item:nth-child(3){--delay:.15s}
.g-item:nth-child(4){--delay:.2s}.g-item:nth-child(5){--delay:.25s}.g-item:nth-child(6){--delay:.3s}
.g-item:nth-child(7){--delay:.35s}.g-item:nth-child(8){--delay:.4s}.g-item:nth-child(9){--delay:.45s}
.g-item:hover{transform:rotate(0deg) scale(1.08)!important;
  box-shadow:0 16px 40px rgba(255,105,180,0.2),0 4px 12px rgba(0,0,0,0.1);
  z-index:20;transition:transform .4s cubic-bezier(.34,1.56,.64,1),box-shadow .4s ease,z-index 0s}
.g-item .g-inner{width:100%;aspect-ratio:1;overflow:hidden;border-radius:2px;position:relative}
.g-item img{width:100%;height:100%;object-fit:cover;transition:transform .6s ease;display:block}
.g-item:hover img{transform:scale(1.08)}
.g-item .g-cap{font-size:12px;color:#8a7080;text-align:center;margin-top:6px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-family:"KaiTi","STKaiti",serif;letter-spacing:1px}
@keyframes photoIn{to{opacity:1;transform:rotate(var(--rot))}}
.hb{position:fixed;pointer-events:none;z-index:9999;font-size:18px;animation:hbFly .8s ease-out forwards}
@keyframes hbFly{0%{opacity:1;transform:translate(0,0) scale(1)}100%{opacity:0;transform:translate(var(--hx),var(--hy)) scale(0.3)}}
.g-item .ph{width:100%;aspect-ratio:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
  background:rgba(255,105,180,0.03);border:2px dashed rgba(255,105,180,0.2);border-radius:8px;color:#ff69b4;
  animation:photoIn .5s ease forwards}
.g-item .ph .ic{font-size:30px;margin-bottom:6px;animation:bounce2 2s infinite}
.g-item .ph .tx{font-size:12px}
@keyframes bounce2{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}

/* Map */
.shuffle-btn{display:inline-block;margin-bottom:16px;padding:8px 20px;background:#fff;border:1px solid rgba(255,105,180,0.2);border-radius:20px;color:#ff69b4;cursor:pointer;font-size:13px;font-family:inherit;transition:all .3s}.shuffle-btn:hover{background:rgba(255,105,180,0.05);border-color:#ff69b4}
.map-wrap{max-width:700px;margin:0 auto;border-radius:16px;overflow:hidden;border:1px solid rgba(255,105,180,0.15);box-shadow:0 4px 20px rgba(255,105,180,0.06)}
.map-wrap #mp{width:100%;height:450px}
.plbl{padding:3px 10px!important;background:rgba(255,255,255,0.9)!important;border:none!important;box-shadow:0 2px 8px rgba(255,105,180,0.15)!important;border-radius:8px!important;font-size:12px!important;color:#ff69b4!important;font-weight:bold!important}

/* Timeline */
.tl{max-width:550px;margin:0 auto;position:relative;padding:10px 0}
.tl::before{content:"";position:absolute;left:20px;top:0;bottom:0;width:3px;background:linear-gradient(to bottom,#ff69b4,#ffb6c1,#ff69b4);border-radius:2px}
.tl-item{position:relative;padding-left:50px;margin-bottom:24px}
.tl-dot{position:absolute;left:14px;top:6px;width:15px;height:15px;background:#ff69b4;border-radius:50%;box-shadow:0 0 8px rgba(255,105,180,0.4);z-index:1}
.tl-card{background:#fff;border:1px solid rgba(255,105,180,0.08);border-radius:14px;padding:20px;
  box-shadow:0 4px 16px rgba(255,105,180,0.04)}
.tl-card .dt{font-size:14px;color:#ff69b4;font-weight:bold;margin-bottom:8px;background:rgba(255,105,180,0.06);display:inline-block;padding:4px 12px;border-radius:10px}
.tl-card .rd{font-size:12px;color:#b895a4;margin-bottom:6px}
.tl-card h3{font-size:18px;color:#4a3040;margin-bottom:6px}
.tl-card p{font-size:13px;color:#8a7080;line-height:1.6}

/* Love Messages */
.tw-box{width:100%;min-height:60vh;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;padding:20px}
.lm{text-align:center;line-height:2;letter-spacing:4px;padding:16px 24px;
  opacity:0;animation-duration:1s;animation-timing-function:cubic-bezier(.25,.46,.45,.94);animation-fill-mode:forwards;
  max-width:90%}
.lm.up{animation-name:lmUp}
.lm.down{animation-name:lmDown}
.lm.left{animation-name:lmLeft}
.lm.right{animation-name:lmRight}
.lm.fade{animation-name:lmFade}
@keyframes lmUp{0%{opacity:0;transform:translateY(40px)}100%{opacity:1;transform:translateY(0)}}
@keyframes lmDown{0%{opacity:0;transform:translateY(-40px)}100%{opacity:1;transform:translateY(0)}}
@keyframes lmLeft{0%{opacity:0;transform:translateX(-40px)}100%{opacity:1;transform:translateX(0)}}
@keyframes lmRight{0%{opacity:0;transform:translateX(40px)}100%{opacity:1;transform:translateX(0)}}
@keyframes lmFade{0%{opacity:0;transform:scale(.85)}100%{opacity:1;transform:scale(1)}}
.lm.out{animation:lmOut .4s ease forwards}
@keyframes lmOut{to{opacity:0;transform:scale(.85);max-height:0;padding:0;margin:0}}

/* Bottom Nav */
nav.bottom-nav{position:fixed;bottom:0;left:0;width:100%;background:rgba(255,255,255,0.95);border-top:1px solid rgba(255,105,180,0.12);
  display:flex;justify-content:space-around;padding:6px 0;z-index:100;backdrop-filter:blur(12px);box-shadow:0 -2px 20px rgba(255,105,180,0.04)}
.nav-item{background:none;border:none;color:#b895a4;font-size:12px;cursor:pointer;padding:8px 4px;
  display:flex;flex-direction:column;align-items:center;gap:2px;font-family:inherit;transition:color .3s}
.nav-item .ni{font-size:22px}
.nav-item.active{color:#ff69b4}

/* Lightbox */
.lb{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.85);z-index:1000;display:none;align-items:center;justify-content:center}
.lb.on{display:flex}
.lb img{max-width:90%;max-height:85%;border-radius:10px}
.lb .cls{position:absolute;top:20px;right:30px;color:#fff;font-size:32px;cursor:pointer}
.lb .pv{position:absolute;top:50%;color:#fff;font-size:36px;cursor:pointer;padding:10px;user-select:none}
.lb #lp{left:10px}.lb #ln{right:10px}

/* Effects */
#hc{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:999}
.hp{position:absolute;animation:fu linear forwards;opacity:.5}
@keyframes fu{0%{transform:translateY(0)rotate(0)scale(1);opacity:.7}100%{transform:translateY(-100vh)rotate(360deg)scale(.2);opacity:0}}
.cf{position:fixed;pointer-events:none;z-index:998;animation:ff 1.4s ease-out forwards;font-size:18px;user-select:none}
@keyframes ff{0%{opacity:1;transform:translate(0,0)rotate(0)scale(.5)}30%{opacity:.8;transform:translate(var(--dx),var(--dy))rotate(60deg)scale(1)}100%{opacity:0;transform:translate(var(--dx2),var(--dy2))rotate(180deg)scale(.3)}}

@media(max-width:600px){.hero h1{font-size:36px}.c-grid{gap:10px}.c-item{min-width:70px;padding:16px 12px}.c-item .n{font-size:28px}.g-grid{grid-template-columns:repeat(2,1fr)}.map-wrap #mp{height:300px}}
</style>
</head>
<body>

<div id="app">

<!-- Hero -->
<div class="page active" id="pg-hero">
<div class="hero">
<div>
<h1>遇见你</h1>
<p>我们的故事从这里开始</p>
<p class="sub">每一天，都值得被铭记</p>
<button class="start-btn" onclick="goPage('countdown')">开始回忆</button>
</div>
</div>
</div>

<!-- Countdown + Timeline -->
<div class="page" id="pg-countdown">
<div class="page-content">
<h2>这是我们走过的</h2>
<p class="sub">在一起的每一天都值得纪念</p>
<div class="c-grid">
<div class="c-item"><div class="n" id="y">0</div><div class="l">年</div></div>
<div class="c-item"><div class="n" id="mo">0</div><div class="l">月</div></div>
<div class="c-item"><div class="n" id="d">0</div><div class="l">天</div></div>
<div class="c-item"><div class="n" id="h">0</div><div class="l">时</div></div>
<div class="c-item"><div class="n" id="mi">0</div><div class="l">分</div></div>
<div class="c-item"><div class="n" id="s">0</div><div class="l">秒</div></div>
</div>
<div class="tl" id="tc" style="margin-top:36px"></div>
</div>
</div>

<!-- Gallery -->
<div class="page" id="pg-gallery">
<div class="page-content">
<h2>照片墙</h2>
<p class="sub">每一帧都是最好的时光</p>
<button class="shuffle-btn" onclick="shufflePhotos()">随机排列</button>
<div class="g-grid" id="gg"></div>
</div>
</div>

<!-- Map -->
<div class="page" id="pg-map">
<div class="page-content">
<h2>我们一起走过</h2>
<p class="sub">已共同走过 <span id="pc">0</span> 个地方</p>
<div class="map-wrap"><div id="mp"></div></div>
</div>
</div>

<!-- Love Messages -->
<div class="page" id="pg-love">
<div class="page-content" style="max-width:100%;padding:40px 20px">
<h2>我想对你说的话</h2>
<p class="sub">那些藏在心里的话</p>
<div class="tw-box"><div id="tw"></div></div>
</div>
</div>

<!-- Lightbox -->
<div class="lb" id="lb" onclick="clb()"><span class="cls">&times;</span><span class="pv" id="lp">&#10094;</span><img id="li" src=""><span class="pv" id="ln">&#10095;</span></div>

<!-- Nav -->
<nav class="bottom-nav" id="bnav" style="display:none">
<button class="nav-item active" onclick="goPage('countdown')"><span class="ni">💒</span>纪念日</button>
<button class="nav-item" onclick="goPage('gallery')"><span class="ni">📷</span>照片</button>
<button class="nav-item" onclick="goPage('map')"><span class="ni">🗺️</span>足迹</button>
<button class="nav-item" onclick="goPage('love')"><span class="ni">💌</span>情话</button>
</nav>

<div id="hc"></div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
var curPage="hero";
var C={anniversary:"2024-01-01",photos:[],places:[],timeline:[
{date:"初见",realDate:"",title:"第一次相遇",desc:"那天阳光正好，你的笑容让我一眼就记住了你。"},
{date:"确定关系",realDate:"",title:"我们在一起了",desc:"那一天，世界都变成了粉红色。"},
{date:"第一次旅行",realDate:"",title:"一起看世界",desc:"和你在一起的旅途，风景都变得更美。"},
{date:"你的生日",realDate:"",title:"陪你过的生日",desc:"只想每年都陪在你身边，对你说生日快乐。"}
],loveMessages:[],mapCenter:[30.5,114.3],mapZoom:5,galleryMode:"photos",qqAlbumUrl:""};

(function(){try{var d=localStorage.getItem("love_config");if(d){Object.assign(C,JSON.parse(d))}}catch(e){}})();

function goPage(name){
  if(curPage===name)return;
  var old=document.getElementById("pg-"+curPage);
  var pg=document.getElementById("pg-"+name);
  if(!pg)return;
  old.classList.remove("active");
  pg.classList.add("active");
  curPage=name;
  if(name!=="hero"){document.getElementById("bnav").style.display="flex"}
  else{document.getElementById("bnav").style.display="none"}
  document.querySelectorAll(".nav-item").forEach(function(b){b.classList.remove("active")});
  var nb=document.querySelector(".nav-item[onclick*=\""+name+"\"]");
  if(nb)nb.classList.add("active");
  if(name==="map"){setTimeout(function(){initMap()},100)}
  pg.scrollTop=0
}

renderGallery();renderTimeline();
updateCountdown();setInterval(updateCountdown,1000);

function updateCountdown(){var st=new Date(C.anniversary),n=new Date();var y=n.getFullYear()-st.getFullYear(),m=n.getMonth()-st.getMonth(),d=n.getDate()-st.getDate();if(d<0){m--;d+=new Date(n.getFullYear(),n.getMonth(),0).getDate()}if(m<0){y--;m+=12}document.getElementById("y").textContent=y;document.getElementById("mo").textContent=m;document.getElementById("d").textContent=d;document.getElementById("h").textContent=(n.getHours()-st.getHours()+24)%24;document.getElementById("mi").textContent=(n.getMinutes()-st.getMinutes()+60)%60;document.getElementById("s").textContent=(n.getSeconds()-st.getSeconds()+60)%60}

function renderGallery(){
  var g=document.getElementById("gg");
  g.innerHTML="";
  if(C.galleryMode==="qq_album"&&C.qqAlbumUrl){
    var item=document.createElement("div");item.className="g-item";item.style.setProperty("--rot","0deg");
    var inner=document.createElement("div");inner.className="g-inner";
    var ph=document.createElement("div");ph.className="ph";
    ph.innerHTML='<div class="ic">📎</div><div class="tx">QQ相册</div>';
    inner.appendChild(ph);item.appendChild(inner);
    var cap=document.createElement("div");cap.className="g-cap";cap.textContent="QQ相册";
    item.appendChild(cap);g.appendChild(item);return
  }
  if(C.photos.length===0){
    for(var i=1;i<=6;i++){
      var item=document.createElement("div");item.className="g-item";item.style.setProperty("--rot",((Math.random()*6-3).toFixed(1))+"deg");
      var inner=document.createElement("div");inner.className="g-inner";
      var ph=document.createElement("div");ph.className="ph";
      ph.innerHTML='<div class="ic">📷</div><div class="tx">合照 '+i+'</div>';
      inner.appendChild(ph);item.appendChild(inner);
      var cap=document.createElement("div");cap.className="g-cap";cap.textContent="我们的回忆";
      item.appendChild(cap);g.appendChild(item)
    }
    return
  }
  C.photos.forEach(function(p,i){
    var item=document.createElement("div");item.className="g-item";item.style.setProperty("--rot",((Math.random()*6-3).toFixed(1))+"deg");item.style.setProperty("--delay",(i*0.06)+"s");
    item.addEventListener("click",function(e){hb(item,e);setTimeout(function(){ol(i)},200)});
    var inner=document.createElement("div");inner.className="g-inner";
    var img=document.createElement("img");img.src=p.src||"";img.alt=p.title||"";img.loading="lazy";
    img.onerror=function(){this.style.display="none";var ph=document.createElement("div");ph.className="ph";ph.innerHTML='<div class="ic">💔</div><div class="tx">加载失败</div>';inner.innerHTML="";inner.appendChild(ph)};
    inner.appendChild(img);item.appendChild(inner);
    var cap=document.createElement("div");cap.className="g-cap";cap.textContent=p.title||"📷 回忆";
    item.appendChild(cap);g.appendChild(item)
  })
}function escp(s){if(!s)return"";var d=document.createElement("div");d.appendChild(document.createTextNode(s));return d.innerHTML}

var ci=0;
function ol(i){if(C.photos.length===0)return;ci=i;sl();document.getElementById("lb").classList.add("on")}
function clb(){document.getElementById("lb").classList.remove("on")}
function sl(){document.getElementById("li").src=C.photos[ci].src}
document.getElementById("lp").addEventListener("click",function(e){e.stopPropagation();if(C.photos.length===0)return;ci=(ci-1+C.photos.length)%C.photos.length;sl()});
document.getElementById("ln").addEventListener("click",function(e){e.stopPropagation();if(C.photos.length===0)return;ci=(ci+1)%C.photos.length;sl()});
document.addEventListener("keydown",function(e){if(!document.getElementById("lb").classList.contains("on"))return;if(e.key==="Escape")clb();if(e.key==="ArrowLeft")document.getElementById("lp").click();if(e.key==="ArrowRight")document.getElementById("ln").click()});

var mapInited=false;
function initMap(){if(mapInited)return;mapInited=true;var mp=L.map("mp").setView(C.mapCenter,C.mapZoom);L.tileLayer("https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png",{attribution:"&copy; OSM",maxZoom:18}).addTo(mp);var hi=L.divIcon({className:"cm",html:"<div style=\"width:28px;height:28px;background:#ff69b4;border-radius:50%;display:flex;align-items:center;justify-content:center;box-shadow:0 0 10px rgba(255,105,180,0.5);font-size:14px\">📍</div>",iconSize:[28,28],iconAnchor:[14,28],popupAnchor:[0,-28]});var ps=C.places;document.getElementById("pc").textContent=ps.length;if(ps.length>0){var bd=[];ps.forEach(function(p){var mk=L.marker([p.lat,p.lng],{icon:hi}).addTo(mp);mk.bindTooltip(escp(p.name),{permanent:true,direction:"top",offset:[0,-14],className:"plbl"});mk.bindPopup("<strong>"+escp(p.name)+"</strong><br><span style=color:#b895a4>"+escp(p.date||"")+"</span><br>"+escp(p.desc||""));bd.push([p.lat,p.lng])});if(bd.length>1)mp.fitBounds(bd,{padding:[40,40]});else if(bd.length===1)mp.setView(bd[0],13)}}

function renderTimeline(){var c=document.getElementById("tc"),h="";C.timeline.forEach(function(t){var rd=t.realDate||"";var dt=t.date||"";h+="<div class=\"tl-item\"><div class=\"tl-dot\"></div><div class=\"tl-card\">"+(rd?"<div class=\"rd\">"+escp(rd)+"</div>":"")+"<div class=\"dt\">"+escp(dt)+"</div><h3>"+escp(t.title)+"</h3><p>"+escp(t.desc)+"</p></div></div>"});c.innerHTML=h}

function shufflePhotos(){if(C.photos.length<2)return;for(var i=C.photos.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=C.photos[i];C.photos[i]=C.photos[j];C.photos[j]=t}renderGallery()}
function hb(el,ev){var hts=["❤","💕","💖","💗","💝","💘","💓","💞"];for(var i=0;i<8;i++){var h=document.createElement("span");h.className="hb";h.textContent=hts[Math.floor(Math.random()*hts.length)];h.style.left=ev.clientX+"px";h.style.top=ev.clientY+"px";h.style.fontSize=(12+Math.random()*16)+"px";h.style.setProperty("--hx",((Math.random()-0.5)*120)+"px");h.style.setProperty("--hy",(-(40+Math.random()*80))+"px");h.style.animationDelay=(Math.random()*0.3)+"s";document.body.appendChild(h);setTimeout(function(){h.remove()},1200)}}
