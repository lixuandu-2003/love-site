<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>后台管理 - 我们的故事</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://cdn.jsdelivr.net/npm/exif-js@2.3.0/exif.min.js"></script>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:"Microsoft YaHei",sans-serif;background:#fff0f5;color:#4a3040;min-height:100vh}
#lo{position:fixed;top:0;left:0;width:100%;height:100%;background:linear-gradient(135deg,#fff5f7,#ffe4e9);display:flex;align-items:center;justify-content:center;z-index:10000}
#lo.hid{display:none}
.lb{background:#fff;border-radius:24px;padding:48px 40px;box-shadow:0 20px 60px rgba(255,105,180,0.12);text-align:center;max-width:400px;width:90%}
.lb h2{font-size:22px;background:linear-gradient(135deg,#ff69b4,#ff1493);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:8px}
.lb p{color:#b895a4;font-size:14px;margin-bottom:28px}
.lb input{width:100%;padding:14px 16px;background:#fff5f7;border:1px solid rgba(255,105,180,0.2);border-radius:12px;font-size:16px;text-align:center;letter-spacing:4px;color:#4a3040;font-family:inherit}
.lb input:focus{outline:none;border-color:#ff69b4}
.lb .lbtn{width:100%;margin-top:16px;padding:14px;background:linear-gradient(135deg,#ff69b4,#ff1493);color:#fff;border:none;border-radius:12px;font-size:16px;font-weight:bold;cursor:pointer;font-family:inherit}
.lb .lbtn:hover{opacity:.9}
.lb .err{color:#e74c3c;font-size:13px;margin-top:12px;min-height:20px}
.hd{background:rgba(255,255,255,0.95);border-bottom:1px solid rgba(255,105,180,0.15);padding:12px 32px;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:100;backdrop-filter:blur(12px)}
.hd h1{font-size:20px;background:linear-gradient(135deg,#ff69b4,#ff1493);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.ha{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.btn{padding:9px 18px;border-radius:10px;border:none;cursor:pointer;font-size:13px;font-weight:bold;font-family:inherit;transition:all .3s}
.btn-p{background:linear-gradient(135deg,#ff69b4,#ff1493);color:#fff}
.btn-p:hover{opacity:.85}
.btn-o{background:#fff;border:1px solid rgba(255,105,180,0.3);color:#ff69b4}
.btn-o:hover{background:rgba(255,105,180,0.05)}
.btn-sm{padding:6px 14px;font-size:12px}
.btn-d{background:rgba(255,80,80,0.08);color:#e74c3c;border:1px solid rgba(255,80,80,0.2)}
.ab{max-width:900px;margin:0 auto;padding:32px 24px}
.card{background:#fff;border:1px solid rgba(255,105,180,0.1);border-radius:20px;padding:28px;margin-bottom:24px;box-shadow:0 4px 24px rgba(255,105,180,0.06)}
.ch{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;padding-bottom:16px;border-bottom:1px solid rgba(255,105,180,0.1)}
.ch h2{font-size:20px;color:#ff69b4}
.fg{margin-bottom:14px}
.fg label{display:block;font-size:13px;color:#b895a4;margin-bottom:6px;font-weight:bold}
.fg input,.fg textarea,.fg select{width:100%;padding:10px 14px;background:#fff5f7;border:1px solid rgba(255,105,180,0.15);border-radius:10px;color:#4a3040;font-size:14px;font-family:inherit}
.fg input:focus,.fg textarea:focus{outline:none;border-color:#ff69b4}
.fg textarea{resize:vertical;min-height:60px}
.fr{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.fr3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
.li{background:#fff5f7;border:1px solid rgba(255,105,180,0.08);border-radius:14px;padding:16px;margin-bottom:12px}
.lh{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.lh .tl{font-size:15px;color:#ff69b4;font-weight:bold}
.lh .ac{display:flex;gap:8px}
.abtn{width:100%;padding:12px;background:transparent;border:2px dashed rgba(255,105,180,0.25);border-radius:12px;color:#ff69b4;font-size:14px;cursor:pointer;font-family:inherit}
.abtn:hover{background:rgba(255,105,180,0.05)}
.toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%);background:#333;color:#fff;padding:12px 28px;border-radius:25px;font-size:14px;z-index:9999;animation:toastIn .3s ease}
@keyframes toastIn{from{opacity:0;transform:translateX(-50%) translateY(20px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
.ib{background:#fff5f7;border-radius:12px;padding:16px;margin-bottom:12px;font-size:14px;color:#8a7080}
#locResults{max-height:150px;overflow-y:auto;margin-top:8px;border-radius:10px;border:1px solid rgba(255,105,180,0.15)}
#locResults div{cursor:pointer;padding:8px 12px;font-size:13px;border-bottom:1px solid rgba(255,105,180,0.06);color:#4a3040}
#locResults div:hover{background:rgba(255,105,180,0.06)}
#locMap{width:100%;height:260px;border-radius:12px;margin-top:8px;border:1px solid rgba(255,105,180,0.15)}
@media(max-width:768px){.hd{padding:12px 16px}.fr,.fr3{grid-template-columns:1fr}}
</style>
</head>
<body>

<div id="lo">
<div class="lb">
<h2>后台管理</h2>
<p>请输入密码</p>
<input type="password" id="lpw" placeholder="密码">
<button class="lbtn" id="lbtn" onclick="hl()">登 录</button>
<div class="err" id="le"></div>
<div class="err" id="llok" style="display:none"></div>
</div>
</div>

<div id="mc" style="display:none">
<div class="hd">
<h1>后台管理</h1>
<div class="ha">
<button class="btn btn-p" onclick="saveAll()">保存</button>
<button class="btn btn-o btn-sm" onclick="preview()">预览前台</button>
<button class="btn btn-o btn-sm" onclick="exportJ()">导出</button>
<button class="btn btn-o btn-sm" onclick="importJ()">导入</button>
<button class="btn btn-d btn-sm" onclick="lo2()">退出</button>
</div>
</div>

<div class="ab">

<!-- 基本信息 -->
<div class="card">
<div class="ch"><h2>基本信息</h2></div>
<div class="fg"><label>纪念日</label><input type="date" id="ann"></div>
</div>

<!-- 照片管理 -->
<div class="card">
<div class="ch"><h2>照片管理 <span id="pcn">0</span>张</h2></div>
<input type="file" id="photoPicker" multiple accept="image/*" style="display:none" onchange="pickPhotos(this)">
<button class="btn btn-p" onclick="document.getElementById('photoPicker').click()" style="width:100%;margin-bottom:8px">选择照片上传</button>
<div id="pl"></div>
<button class="abtn" onclick="ap()">+ 添加照片</button>
</div>

<!-- 地图地点 -->
<div class="card">
<div class="ch"><h2>去过的地方 <span id="plcn">0</span>个</h2></div>
<div class="ib">
<strong>搜索地点：</strong>
<div style="display:flex;gap:8px;margin:8px 0">
<input type="text" id="locSearch" placeholder="输入地名，如：武汉大学" style="flex:1" onkeydown="if(event.key==='Enter')searchLoc()">
<button class="btn btn-p btn-sm" onclick="searchLoc()">搜索</button>
</div>
<div id="locResults"></div>
<div id="locMap" style="display:none"></div>
<button id="addLocBtn" class="btn btn-p" style="width:100%;margin-top:8px;display:none" onclick="addLocFromMap()">添加此地标</button>
</div>
<div id="pll"></div>
<button class="abtn" onclick="apl()">+ 手动添加地点</button>
</div>

<!-- 时间线 -->
<div class="card">
<div class="ch"><h2>时间线</h2></div>
<div id="tll"></div>
<button class="abtn" onclick="atl()">+ 添加事件</button>
</div>

<!-- 情话 -->
<div class="card">
<div class="ch"><h2>情话管理</h2></div>
<div id="ml"></div>
<button class="abtn" onclick="am()">+ 添加情话</button>
</div>

<!-- 地图设置 -->
<div class="card">
<div class="ch"><h2>地图设置</h2></div>
<div class="fr3">
<div class="fg"><label>中心纬度</label><input type="number" step="0.01" id="mclat"></div>
<div class="fg"><label>中心经度</label><input type="number" step="0.01" id="mclng"></div>
<div class="fg"><label>缩放级别</label><input type="number" id="mz" min="1" max="18"></div>
</div>
</div>

</div>
</div>

<script>
var DK={anniversary:"2024-01-01",photos:[],places:[],timeline:[
{date:"初见",realDate:"",title:"第一次相遇",desc:"那天阳光正好，你的笑容让我一眼就记住了你。"},
{date:"确定关系",realDate:"",title:"我们在一起了",desc:"那一天，世界都变成了粉红色。"},
{date:"第一次旅行",realDate:"",title:"一起看世界",desc:"和你在一起的旅途，风景都变得更美。"},
{date:"你的生日",realDate:"",title:"陪你过的生日",desc:"只想每年都陪在你身边，对你说生日快乐。"}
],loveMessages:["遇见你，是我这辈子最幸运的事。"],mapCenter:[30.5,114.3],mapZoom:5};
var config=JSON.parse(JSON.stringify(DK));
var SK="love_config";
var PH="love_admin_pwhash";
var DH="39dcdf1896678f116672a02067102e69641e537ecf5f6ad96178d1be8a7e60b0";
var SE="love_admin_session";
var LK="love_admin_lockout";
var AC="love_admin_attempts";
var SESS=15,MAXA=5,LOCK=30;

function esc(s){if(!s)return"";var d=document.createElement("div");d.appendChild(document.createTextNode(s));return d.innerHTML}
function esa(s){if(!s)return"";return s.replace(/"/g,"&quot;").replace(/'/g,"&#39;")}
function saveCfg(cfg){localStorage.setItem(SK,JSON.stringify(cfg))}
function loadConfig(){
  // Try localStorage first (admin's working copy)
  try{var r=localStorage.getItem(SK);if(r){var d=JSON.parse(r);return Object.assign({},DK,d)}}catch(e){}
  // Fallback: try loading config.json (published version)
  try{
    var xhr=new XMLHttpRequest();
    xhr.open("GET","config.json",false);
    xhr.send();
    if(xhr.status===200){var d=JSON.parse(xhr.responseText);return Object.assign({},DK,d)}
  }catch(e){}
  return JSON.parse(JSON.stringify(DK))
}

async function sha256(m){var e=new TextEncoder();var d=await crypto.subtle.digest("SHA-256",e.encode(m));return Array.from(new Uint8Array(d)).map(function(b){return b.toString(16).padStart(2,"0")}).join("")}
function ss(){var x=Date.now()+SESS*60000;localStorage.setItem(SE,x.toString());return x}
function cs(){var x=parseInt(localStorage.getItem(SE)||"0");return x>Date.now()}
function rs(){ss()}
function ds(){localStorage.removeItem(SE)}
function glr(){var x=parseInt(localStorage.getItem(LK)||"0");return x?Math.max(0,Math.ceil((x-Date.now())/1000)):0}
function rfa(){var c=parseInt(localStorage.getItem(AC)||"0")+1;localStorage.setItem(AC,c.toString());if(c>=MAXA){localStorage.setItem(LK,(Date.now()+LOCK*60000).toString());localStorage.setItem(AC,"0");return LOCK*60}return 0}
function cla(){localStorage.removeItem(AC);localStorage.removeItem(LK)}

async function hl(){var p=document.getElementById("lpw").value;var e=document.getElementById("le");var l=document.getElementById("llok");var b=document.getElementById("lbtn");if(!p){e.textContent="请输入密码";return}var lr=glr();if(lr>0){l.style.display="block";l.textContent="已锁定 "+Math.ceil(lr/60)+" 分钟";return}b.disabled=true;b.textContent="验证中...";try{var h=await sha256(p);var sh=localStorage.getItem(PH)||DH;if(h===sh){cla();ss();document.getElementById("lo").classList.add("hid");document.getElementById("mc").style.display="";e.textContent="";l.style.display="none";initA()}else{var ls=rfa();if(ls>0){l.style.display="block";l.textContent="错误过多，已锁定 "+ls/60+" 分钟"}else{e.textContent="密码错误"}}}catch(ex){e.textContent="验证失败"}b.disabled=false;b.textContent="登 录"}
document.getElementById("lpw").addEventListener("keydown",function(ev){if(ev.key==="Enter")hl()});

function lo2(){ds();document.getElementById("mc").style.display="none";document.getElementById("lo").classList.remove("hid");document.getElementById("lpw").focus()}

function initA(){config=loadConfig();document.getElementById("ann").value=config.anniversary;document.getElementById("mclat").value=config.mapCenter[0];document.getElementById("mclng").value=config.mapCenter[1];document.getElementById("mz").value=config.mapZoom;rp();rpl();rtl();rm()}

function saveAll(){config.anniversary=document.getElementById("ann").value;config.mapCenter=[parseFloat(document.getElementById("mclat").value)||30.5,parseFloat(document.getElementById("mclng").value)||114.3];config.mapZoom=parseInt(document.getElementById("mz").value)||5;saveCfg(config);var t=document.createElement("div");t.className="toast";t.textContent="全部保存成功！";t.style.background="linear-gradient(135deg,#ff69b4,#ff1493)";document.body.appendChild(t);setTimeout(function(){t.remove()},3000)}

// === 照片 ===
function rp(){var c=document.getElementById("pl");document.getElementById("pcn").textContent=config.photos.length;var h="";config.photos.forEach(function(p,i){h+='<div class="li"><div class="lh"><span class="tl">照片 '+(i+1)+'</span><div class="ac"><button class="btn btn-o btn-sm" onclick="mp('+i+',-1)">上</button><button class="btn btn-o btn-sm" onclick="mp('+i+',1)">下</button><button class="btn btn-d btn-sm" onclick="dp('+i+')">删除</button></div></div><div class="fr"><div class="fg"><label>路径</label><input type="text" value="'+esa(p.src||"")+'" onchange="up('+i+',\'src\',this.value)"></div><div class="fg"><label>标题</label><input type="text" value="'+esa(p.title||"")+'" onchange="up('+i+',\'title\',this.value)"></div></div></div>'});c.innerHTML=h}
function ap(){config.photos.push({src:"",title:""});rp();saveCfg(config)}
function dp(i){config.photos.splice(i,1);rp();saveCfg(config)}
function up(i,k,v){config.photos[i][k]=v;saveCfg(config);toast("照片已自动保存")}
function mp(i,d){var j=i+d;if(j<0||j>=config.photos.length)return;var t=config.photos[i];config.photos[i]=config.photos[j];config.photos[j]=t;rp();saveCfg(config)}

// === 地点 ===
function rpl(){var c=document.getElementById("pll");document.getElementById("plcn").textContent=config.places.length;var h="";config.places.forEach(function(p,i){h+='<div class="li"><div class="lh"><span class="tl">'+esc(p.name||"未命名")+'</span><div class="ac"><button class="btn btn-o btn-sm" onclick="mpl('+i+',-1)">上</button><button class="btn btn-o btn-sm" onclick="mpl('+i+',1)">下</button><button class="btn btn-d btn-sm" onclick="dpl('+i+')">删除</button></div></div><div class="fg"><label>名称</label><input type="text" value="'+esa(p.name||"")+'" onchange="upl('+i+',\'name\',this.value)"></div><div class="fr3"><div class="fg"><label>纬度</label><input type="number" step="0.0001" value="'+(p.lat||"")+'" onchange="upl('+i+',\'lat\',parseFloat(this.value))"></div><div class="fg"><label>经度</label><input type="number" step="0.0001" value="'+(p.lng||"")+'" onchange="upl('+i+',\'lng\',parseFloat(this.value))"></div><div class="fg"><label>日期</label><input type="text" value="'+esa(p.date||"")+'" onchange="upl('+i+',\'date\',this.value)"></div></div><div class="fg"><label>描述</label><input type="text" value="'+esa(p.desc||"")+'" onchange="upl('+i+',\'desc\',this.value)"></div></div>'});c.innerHTML=h}
function apl(){config.places.push({name:"",lat:30.5,lng:114.3,date:"",desc:""});rpl();saveCfg(config)}
function dpl(i){config.places.splice(i,1);rpl();saveCfg(config)}
function upl(i,k,v){config.places[i][k]=v;saveCfg(config);toast("地点已自动保存")}
function mpl(i,d){var j=i+d;if(j<0||j>=config.places.length)return;var t=config.places[i];config.places[i]=config.places[j];config.places[j]=t;rpl();saveCfg(config)}

// === 时间线 ===
function rtl(){var c=document.getElementById("tll");var h="";config.timeline.forEach(function(t,i){h+='<div class="li"><div class="lh"><span class="tl">'+esc(t.title||"新事件")+'</span><div class="ac"><button class="btn btn-o btn-sm" onclick="mtl('+i+',-1)">上</button><button class="btn btn-o btn-sm" onclick="mtl('+i+',1)">下</button><button class="btn btn-d btn-sm" onclick="dtl('+i+')">删除</button></div></div><div class="fg"><label>日期标签(如:初见)</label><input type="text" value="'+esa(t.date||"")+'" onchange="utl('+i+',\'date\',this.value)"></div><div class="fg"><label>实际日期</label><input type="date" value="'+esa(t.realDate||"")+'" onchange="utl('+i+',\'realDate\',this.value)"></div><div class="fg"><label>标题</label><input type="text" value="'+esa(t.title||"")+'" onchange="utl('+i+',\'title\',this.value)"></div><div class="fg"><label>描述</label><textarea onchange="utl('+i+',\'desc\',this.value)">'+esc(t.desc||"")+'</textarea></div></div>'});c.innerHTML=h}
function atl(){config.timeline.push({date:"",realDate:"",title:"",desc:""});rtl();saveCfg(config)}
function dtl(i){config.timeline.splice(i,1);rtl();saveCfg(config)}
function utl(i,k,v){config.timeline[i][k]=v;saveCfg(config);toast("已自动保存")}
function mtl(i,d){var j=i+d;if(j<0||j>=config.timeline.length)return;var t=config.timeline[i];config.timeline[i]=config.timeline[j];config.timeline[j]=t;rtl();saveCfg(config)}

// === 情话 ===
function rm(){var c=document.getElementById("ml");var h="";config.loveMessages.forEach(function(m,i){h+='<div class="li"><div class="lh"><span class="tl">情话 '+(i+1)+'</span><div class="ac"><button class="btn btn-o btn-sm" onclick="mm('+i+',-1)">上</button><button class="btn btn-o btn-sm" onclick="mm('+i+',1)">下</button><button class="btn btn-d btn-sm" onclick="dm('+i+')">删除</button></div></div><div class="fg"><textarea onchange="um('+i+',this.value)">'+esc(m||"")+'</textarea></div></div>'});c.innerHTML=h}
function am(){config.loveMessages.push("");rm();saveCfg(config)}
function dm(i){config.loveMessages.splice(i,1);rm();saveCfg(config)}
function um(i,v){config.loveMessages[i]=v;saveCfg(config);toast("情话已自动保存")}
function mm(i,d){var j=i+d;if(j<0||j>=config.loveMessages.length)return;var t=config.loveMessages[i];config.loveMessages[i]=config.loveMessages[j];config.loveMessages[j]=t;rm();saveCfg(config)}

// === 地图搜索 ===
var locMap=null,locMarker=null,locSelected=null;
function initLocMap(){
  if(locMap) return;
  document.getElementById("locMap").style.display="block";
  locMap=L.map("locMap").setView(config.mapCenter||[30.5,114.3],config.mapZoom||5);
  L.tileLayer("https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png",{maxZoom:18}).addTo(locMap);
  locMap.on("click",function(e){
    if(locMarker) locMap.removeLayer(locMarker);
    locMarker=L.marker(e.latlng,{draggable:true}).addTo(locMap);
    locMarker.on("dragend",function(){var ll=locMarker.getLatLng();locSelected={lat:ll.lat,lng:ll.lng};reverseGeo(ll.lat,ll.lng)});
    locSelected={lat:e.latlng.lat,lng:e.latlng.lng};
    document.getElementById("addLocBtn").style.display="block";
    reverseGeo(e.latlng.lat,e.latlng.lng);
  });
  setTimeout(function(){locMap.invalidateSize()},200);
}
function searchLoc(){
  var q=document.getElementById("locSearch").value.trim();
  if(!q) return;
  initLocMap();
  var xhr=new XMLHttpRequest();
  xhr.open("GET","https://nominatim.openstreetmap.org/search?format=json&q="+encodeURIComponent(q)+"&limit=5&accept-language=zh",true);
  xhr.onload=function(){
    if(xhr.status!==200) return;
    var data=JSON.parse(xhr.responseText);
    window.__locResults=data;
    var h="";
    data.forEach(function(r,i){h+='<div onclick="pickLoc('+i+')">'+esc(r.display_name||r.name)+'</div>'});
    document.getElementById("locResults").innerHTML=h||'<div style="padding:12px;color:#b895a4;text-align:center">未找到，请在地图上点击选择</div>';
    if(data.length>0){
      var r=data[0];
      locMap.setView([r.lat,r.lng],14);
      if(locMarker) locMap.removeLayer(locMarker);
      locMarker=L.marker([r.lat,r.lng],{draggable:true}).addTo(locMap);
      locMarker.on("dragend",function(){var ll=locMarker.getLatLng();locSelected={lat:ll.lat,lng:ll.lng};reverseGeo(ll.lat,ll.lng)});
      locSelected={lat:parseFloat(r.lat),lng:parseFloat(r.lon),name:r.display_name||r.name};
      document.getElementById("addLocBtn").style.display="block";
    }
  };
  xhr.send();
}
function pickLoc(i){
  var r=window.__locResults[i];
  locMap.setView([r.lat,r.lng],15);
  if(locMarker) locMap.removeLayer(locMarker);
  locMarker=L.marker([r.lat,r.lng],{draggable:true}).addTo(locMap);
  locMarker.on("dragend",function(){var ll=locMarker.getLatLng();locSelected={lat:ll.lat,lng:ll.lng};reverseGeo(ll.lat,ll.lng)});
  locSelected={lat:parseFloat(r.lat),lng:parseFloat(r.lon),name:r.display_name||r.name};
  document.getElementById("locSearch").value=r.display_name||r.name;
  document.getElementById("addLocBtn").style.display="block";
}
function reverseGeo(lat,lng){
  var xhr=new XMLHttpRequest();
  xhr.open("GET","https://nominatim.openstreetmap.org/reverse?format=json&lat="+lat+"&lon="+lng+"&accept-language=zh",true);
  xhr.onload=function(){
    if(xhr.status!==200) return;
    var d=JSON.parse(xhr.responseText);
    if(d&&d.display_name){locSelected.name=d.display_name;document.getElementById("locSearch").value=d.display_name}
  };

}

// === GPS 提取 ===
function toDecimal(coord,ref){
  if(!coord) return null;
  var d=coord[0].numerator/coord[0].denominator;
  var m=coord[1].numerator/coord[1].denominator;
  var s=coord[2].numerator/coord[2].denominator;
  var dec=d+m/60+s/3600;
  if(ref==="S"||ref==="W") dec=-dec;
  return Math.round(dec*1e6)/1e6;
}
function extractGPSFromFile(file){
  return new Promise(function(resolve){
    if(!file.name.match(/\.(jpg|jpeg)$/i)){resolve(null);return}
    var reader=new FileReader();
    reader.onload=function(e){
      try{
        EXIF.getData(file,function(){
          var lat=EXIF.getTag(this,"GPSLatitude");
          var lng=EXIF.getTag(this,"GPSLongitude");
          var latRef=EXIF.getTag(this,"GPSLatitudeRef");
          var lngRef=EXIF.getTag(this,"GPSLongitudeRef");
          var date=EXIF.getTag(this,"DateTimeOriginal");
          if(!lat||!lng){resolve(null);return}
          var dlat=toDecimal(lat,latRef);
          var dlng=toDecimal(lng,lngRef);
          if(dlat===null||dlng===null){resolve(null);return}
          resolve({lat:dlat,lng:dlng,date:date||""});
        });
      }catch(ex){resolve(null)}
    };
    reader.onerror=function(){resolve(null)};
    reader.readAsArrayBuffer(file);
  });
}
function haversineKm(lat1,lng1,lat2,lng2){
  var R=6371;
  var dLat=(lat2-lat1)*Math.PI/180;
  var dLng=(lng2-lng1)*Math.PI/180;
  var a=Math.sin(dLat/2)*Math.sin(dLat/2)+Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLng/2)*Math.sin(dLng/2);
  return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}
function isNearbyPlace(lat,lng){
  for(var i=0;i<config.places.length;i++){
    if(haversineKm(lat,lng,config.places[i].lat,config.places[i].lng)<0.1) return true;
  }
  return false;
}
function pickPhotos(input){
  var files=input.files;
  if(!files.length) return;
  var added=0;
  var gpsPromises=[];
  Array.from(files).forEach(function(file){
    var name=file.name;
    if(name.match(/\.(jpg|jpeg|png|gif|webp|bmp)$/i)){
      config.photos.push({src:"photos/"+name,title:""});
      added++;
      gpsPromises.push(extractGPSFromFile(file).then(function(r){return{result:r,name:name}}));
    }
  })
  saveCfg(config);rp();
  toast("已添加 "+added+" 张照片，正在提取位置...");
  input.value="";
  Promise.all(gpsPromises).then(function(results){
    var newPlaces=0;
    results.forEach(function(item){
      if(!item.result) return;
      var r=item.result;
      if(isNearbyPlace(r.lat,r.lng)) return;
      var placeName=item.name.replace(/\.(jpg|jpeg|png|gif|webp|bmp)$/i,"");
      config.places.push({name:placeName,lat:r.lat,lng:r.lng,date:r.date||"",desc:""});
      newPlaces++;
    });
    if(newPlaces>0){saveCfg(config);rpl();toast("从照片中提取了 "+newPlaces+" 个新地点")}
  });
}
